version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: story_db
    environment:
      POSTGRES_DB: story_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-admin}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d story_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: story_app
    ports:
      - "8080:8080"
    environment:
      # Database
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/story_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-admin}
      # JPA
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      # ⚠️ App base URL — PHẢI trùng với URL public (ngrok/domain)
      # Dùng để tạo URL cho ảnh upload (avatar, cover...)
      # Khi dùng ngrok: APP_BASE_URL=https://danille-laziest-yetta.ngrok-free.dev
      APP_BASE_URL: ${APP_BASE_URL:-https://danille-laziest-yetta.ngrok-free.dev}
      # PayOS webhook
      PAYOS_WEBHOOK_URL: ${PAYOS_WEBHOOK_URL:-https://danille-laziest-yetta.ngrok-free.dev/api/payment/ipn}
      # Mail
      SPRING_MAIL_USERNAME: ${MAIL_USERNAME:-}
      SPRING_MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      # OAuth2 Google
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-your-google-client-id}
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-your-google-client-secret}
    volumes:
      # ✅ Persist ảnh upload — không bị mất khi restart container
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

volumes:
  postgres_data:
  uploads_data:   # ✅ Volume cho ảnh upload

