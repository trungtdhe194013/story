spring.application.name=story

server.port=8080

# File upload config
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Support for proxy headers (ngrok, nginx, etc.)
server.forward-headers-strategy=framework

# ===============================
# APP CONFIG
# ===============================
# ?? BASE URL ? used as prefix for uploaded image URLs
# Local dev:   http://localhost:8080
# Ngrok:       https://danille-laziest-yetta.ngrok-free.dev
# Production:  https://your-domain.com
app.base-url=${APP_BASE_URL:https://danille-laziest-yetta.ngrok-free.dev}

# ===============================
# DATABASE CONFIG
# ===============================
spring.datasource.url=jdbc:postgresql://host.docker.internal:5432/story_db
#spring.datasource.url=jdbc:postgresql://localhost:5432/story_db
spring.datasource.username=postgres
spring.datasource.password=admin
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:your-google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:your-google-client-secret}
spring.security.oauth2.client.registration.google.scope=email,profile

logging.level.org.springframework.security=DEBUG


# ===============================
# MAIL CONFIG
# ===============================

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=quotopo@gmail.com
spring.mail.password=mxjlxlygvrmcqyim



spring.mail.protocol=smtp
spring.mail.default-encoding=UTF-8

# SMTP properties
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000


# Debug (ch? b?t khi dev)
spring.mail.properties.mail.debug=true

# CORS Configuration for ngrok and external access
spring.web.cors.allowed-origin-patterns=*
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
spring.web.cors.allowed-headers=*
spring.web.cors.exposed-headers=Authorization,Content-Type
spring.web.cors.allow-credentials=false
spring.web.cors.max-age=3600

